<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ระบบแข่งขันวิ่ง (Realtime)</title>
<style>
body { font-family: Arial; margin: 20px; }
.group { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
#winnersDisplay, #allWinnersDisplay { margin: 5px 0 15px 0; font-weight: bold; }
input[type="checkbox"] { margin-right: 5px; }
</style>
</head>
<body>

<h1>🏃 ระบบแข่งขันวิ่ง (Realtime)</h1>

<button onclick="login()">🔐 แอดมิน</button>
<button onclick="nextRound()">➡️ รอบถัดไป</button>

<h2 id="round"></h2>
<div id="app"></div>

<h3>🏆 ผู้ชนะรอบนี้:</h3>
<div id="winnersDisplay">-</div>

<h3>🏅 ผู้ชนะสะสม:</h3>
<div id="allWinnersDisplay">-</div>

<script>
let isAdmin = false;

function login() {
  let pass = prompt("ใส่รหัส:");
  if (pass === "1234") {
    isAdmin = true;
    alert("เข้าสู่โหมดแอดมิน");
    render();
  }
}

let players = ["A","B","C","D","E","F","G","H","I"];
let round = 1;
let groups = [];
let winners = [];
let roundWinners = [];
let allWinners = [];

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

function createGroups() {
  let temp = shuffle([...players]);
  groups = [];
  for (let i = 0; i < temp.length; i += 3) {
    groups.push(temp.slice(i, i+3));
  }
}

function render() {
  document.getElementById("round").innerText = "รอบที่ " + round;
  let app = document.getElementById("app");
  app.innerHTML = "";

  groups.forEach((g, i) => {
    let div = document.createElement("div");
    div.className = "group";
    div.dataset.index = i;
    div.innerHTML = "<b>กลุ่ม " + (i+1) + "</b><br>";

    g.forEach(p => {
      let label = document.createElement("label");
      let checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.value = p;

      // ถ้าเป็นแอดมิน ติ๊กแล้วอัปเดตทันที
      if (isAdmin) {
        checkbox.addEventListener("change", () => handlePick(div));
      }

      label.appendChild(checkbox);
      label.append(" " + p);
      div.appendChild(label);
      div.appendChild(document.createElement("br"));
    });

    app.appendChild(div);
  });

  renderWinners();
  renderAllWinners();
}

// ฟังก์ชันอัปเดตผู้ชนะทันทีเมื่อติ๊ก
function handlePick(div) {
  let checked = div.querySelectorAll("input:checked");
  let selected = Array.from(checked).map(x => x.value);

  if (selected.length > 2) {
    alert("เลือกได้ไม่เกิน 2 คนต่อกลุ่ม");
    // ยกเลิกการติ๊กล่าสุด
    event.target.checked = false;
    return;
  }

  // รีเซ็ตผู้ชนะของกลุ่มนี้ก่อน
  let groupPlayers = groups[div.dataset.index];
  groupPlayers.forEach(p => {
    roundWinners = roundWinners.filter(x => x !== p);
    winners = winners.filter(x => x !== p);
    allWinners = allWinners.filter(x => x !== p);
  });

  selected.forEach(p => {
    winners.push(p);
    roundWinners.push(p);
    if (!allWinners.includes(p)) allWinners.push(p);
  });

  // เปลี่ยนสีกลุ่มถ้ามีคนถูกเลือก
  div.style.background = selected.length > 0 ? "#c8f7c5" : "#fff";

  renderWinners();
  renderAllWinners();
}

function renderWinners() {
  let display = document.getElementById("winnersDisplay");
  display.innerHTML = roundWinners.join(", ") || "-";
}

function renderAllWinners() {
  let display = document.getElementById("allWinnersDisplay");
  display.innerHTML = allWinners.join(", ") || "-";
}

function nextRound() {
  if (winners.length === 0) {
    alert("ยังไม่มีผู้ชนะ");
    return;
  }

  players = winners;
  winners = [];
  roundWinners = [];
  round++;
  createGroups();
  render();
}

// เริ่มระบบ
createGroups();
render();
</script>

</body>
</html>
